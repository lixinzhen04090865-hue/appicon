<script>
    let tools = document.querySelectorAll('.side-nav li');
    for (let i = 0; i < tools.length; i++) {
        let node = tools[i];
        if (node.querySelector('a').getAttribute('href').endsWith(document.location.pathname)) {
            node.classList.add('active');
            break
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        
        var currentUrl = window.location.pathname;

        
        var links = document.querySelectorAll('.side-nav a');

        
        links.forEach(function(link) {
            var linkUrl = link.getAttribute('href');

            
            if (currentUrl === linkUrl) {
                link.parentElement.classList.add('active');

                
                link.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        });
    });
</script>

            updatePreviewSizes();
        });
        
        // === MODIFICATION START: Added helper function to convert Hex to RGBA ===
        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            // 3 digits
            if (hex.length == 4) {
                r = "0x" + hex[1] + hex[1];
                g = "0x" + hex[2] + hex[2];
                b = "0x" + hex[3] + hex[3];
            // 6 digits
            } else if (hex.length == 7) {
                r = "0x" + hex[1] + hex[2];
                g = "0x" + hex[3] + hex[4];
                b = "0x" + hex[5] + hex[6];
            }
            return `rgba(${+r}, ${+g}, ${+b}, ${alpha})`;
        }
        // === MODIFICATION END ===

        function initializeControls() {
            
            document.getElementById('iconType').addEventListener('change', function(e) {
                iconType = e.target.value;
                if (iconType === 'text') {
                    document.getElementById('textControls').style.display = 'block';
                    document.getElementById('imageControls').style.display = 'none';
                    document.getElementById('fontSizeControl').style.display = 'block';
                    document.getElementById('imageScaleControl').style.display = 'none';
                } else {
                    document.getElementById('textControls').style.display = 'none';
                    document.getElementById('imageControls').style.display = 'block';
                    document.getElementById('fontSizeControl').style.display = 'none';
                    document.getElementById('imageScaleControl').style.display = 'block';
                }
                
                drawIcon();
            });

            
            document.getElementById('iconText').addEventListener('input', drawIcon);

            
            document.getElementById('fontSize').addEventListener('input', drawIcon);

            
            document.getElementById('bgColor').addEventListener('input', function(e) {
                document.getElementById('bgColorText').value = e.target.value;
                drawIcon();
            });

            document.getElementById('bgColorText').addEventListener('input', function(e) {
                if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                    document.getElementById('bgColor').value = e.target.value;
                    drawIcon();
                }
            });
            
            // === MODIFICATION START: Added event listener for opacity slider ===
            document.getElementById('bgAlpha').addEventListener('input', function(e) {
                document.getElementById('bgAlphaValue').textContent = parseFloat(e.target.value).toFixed(2);
                drawIcon();
            });
            // === MODIFICATION END ===

            document.getElementById('textColor').addEventListener('input', function(e) {
                document.getElementById('textColorText').value = e.target.value;
                drawIcon();
            });

            document.getElementById('textColorText').addEventListener('input', function(e) {
                if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                    document.getElementById('textColor').value = e.target.value;
                    drawIcon();
                }
            });

            
            document.querySelectorAll('.shape-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.shape-option').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');
                    currentShape = this.dataset.shape;
                    drawIcon();
                });
            });

            
            document.getElementById('imageScale').addEventListener('input', function(e) {
                imageScale = parseInt(e.target.value);
                document.getElementById('imageScaleValue').textContent = imageScale + '%';
                drawIcon();
            });

            
            const uploadArea = document.getElementById('uploadArea');
            const imageInput = document.getElementById('imageInput');

            uploadArea.addEventListener('click', () => imageInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleImageUpload(files[0]);
                }
            });

            imageInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleImageUpload(e.target.files[0]);
                }
            });
        }

        function handleImageUpload(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请上传图片文件', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    uploadedImage = img;
                    displayImagePreview(e.target.result);
                    drawIcon();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayImagePreview(src) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = `
                <img src="${src}" alt="上传的图片">
                <button class="remove-image" onclick="removeImage()">移除图片</button>
            `;
        }

        function removeImage() {
            uploadedImage = null;
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('imageInput').value = '';
            drawIcon();
        }

        function initializeExportOptions() {
            
            document.querySelectorAll('.platform-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.platform-content').forEach(c => c.classList.remove('active'));

                    this.classList.add('active');
                    currentPlatform = this.dataset.platform;
                    document.getElementById(`${currentPlatform}-content`).classList.add('active');

                    updateExportOptions();
                });
            });

            updateExportOptions();
        }

        function updateExportOptions() {
            const container = document.getElementById(`${currentPlatform}-content`);
            container.innerHTML = '';

            const sizes = platformSizes[currentPlatform];
            const exportOptions = document.createElement('div');
            exportOptions.className = 'export-options';

            sizes.forEach(size => {
                const div = document.createElement('div');
                div.className = 'checkbox-group checkbox';
                div.innerHTML = `
                    <input type="checkbox" id="${size.id}" ${selectedSizes.has(size.id) ? 'checked' : ''}>
                    <label for="${size.id}">${size.name} (${size.width}x${size.height})</label>
                `;

                const checkbox = div.querySelector('input');
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        selectedSizes.add(size.id);
                    } else {
                        selectedSizes.delete(size.id);
                    }
                });

                exportOptions.appendChild(div);
            });

            container.appendChild(exportOptions);
        }
        
        // === MODIFICATION START: Updated drawIcon to use RGBA ===
        function drawIcon() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const size = canvas.width;

            if (size === 0) {
                resizeCanvas();
                return;
            }
            ctx.clearRect(0, 0, size, size);

            const hexColor = document.getElementById('bgColor').value;
            const alpha = parseFloat(document.getElementById('bgAlpha').value);
            const bgColor = hexToRgba(hexColor, alpha);
            
            ctx.fillStyle = bgColor;
            ctx.beginPath();

            const padding = size * 0.02;

            if (currentShape === 'circle') {
                ctx.arc(size / 2, size / 2, size / 2 - padding, 0, Math.PI * 2);
            } else if (currentShape === 'rounded') {
                roundRect(ctx, padding, padding, size - padding * 2, size - padding * 2, size * 0.08);
            } else {
                ctx.rect(padding, padding, size - padding * 2, size - padding * 2);
            }

            ctx.fill();

            if (iconType === 'text') {
                const textColor = document.getElementById('textColor').value;
                const text = document.getElementById('iconText').value || 'A';
                const fontSize = parseInt(document.getElementById('fontSize').value) * (size / 1024);

                ctx.fillStyle = textColor;
                ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, size / 2, size / 2);
            } else if (iconType === 'image') {
                if (uploadedImage) {
                    const imgPadding = size * 0.12;
                    const imageSize = size - imgPadding * 2;
                    const scaledSize = imageSize * (imageScale / 100);
                    const xPos = (size - scaledSize) / 2;
                    const yPos = (size - scaledSize) / 2;

                    ctx.save();
                    if (currentShape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(size / 2, size / 2, size / 2 - padding, 0, Math.PI * 2);
                        ctx.clip();
                    } else if (currentShape === 'rounded') {
                        ctx.beginPath();
                        roundRect(ctx, padding, padding, size - padding * 2, size - padding * 2, size * 0.08);
                        ctx.clip();
                    }
                    ctx.drawImage(uploadedImage, xPos, yPos, scaledSize, scaledSize);
                    ctx.restore();
                } else {
                    const textColor = document.getElementById('textColor').value;
                    ctx.fillStyle = textColor;
                    ctx.font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('请上传图片', size / 2, size / 2);
                }
            }
            updatePreviewSizes();
        }
        // === MODIFICATION END ===

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function updatePreviewSizes() {
            const container = document.getElementById('previewSizes');
            container.innerHTML = '';
            
            const sizes = platformSizes[currentPlatform];
            const previewSizes = sizes.filter(s => [1024, 512, 192, 180, 152, 120, 96, 76].some(dim =>
                s.width === dim || s.height === dim)).slice(0, 4);

            previewSizes.forEach(size => {
                const div = document.createElement('div');
                div.className = 'size-preview';

                const canvas = document.createElement('canvas');
                canvas.width = 60;
                canvas.height = 60;

                const ctx = canvas.getContext('2d');
                // Pass the correct target icon dimensions
                drawIconOnCanvas(ctx, 60, 60, size.width, size.height);

                const label = document.createElement('label');
                label.textContent = `${size.name}`;

                div.appendChild(canvas);
                div.appendChild(label);
                container.appendChild(div);
            });
        }
        
        // === MODIFICATION START: Updated drawIconOnCanvas to use RGBA and respect shapes ===
        function drawIconOnCanvas(ctx, canvasWidth, canvasHeight) {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Get color and alpha to create RGBA value
            const hexColor = document.getElementById('bgColor').value;
            const alpha = parseFloat(document.getElementById('bgAlpha').value);
            const bgColor = hexToRgba(hexColor, alpha);

            // Draw the background shape (respecting circle/rounded/square)
            ctx.fillStyle = bgColor;
            const shape = document.querySelector('.shape-option.active').dataset.shape;
            const padding = canvasWidth * 0.02;

            if (shape === 'circle') {
                ctx.beginPath();
                ctx.arc(canvasWidth / 2, canvasHeight / 2, (canvasWidth / 2) - padding, 0, Math.PI * 2);
                ctx.fill();
            } else if (shape === 'rounded') {
                roundRect(ctx, padding, padding, canvasWidth - padding * 2, canvasHeight - padding * 2, canvasWidth * 0.08);
                ctx.fill();
            } else {
                ctx.fillRect(padding, padding, canvasWidth - padding * 2, canvasHeight - padding * 2);
            }

            // Save context and clip to the drawn shape before adding text/image
            ctx.save();
            if (shape !== 'square') { // No need to clip for a square that's already drawn
                ctx.clip();
            }

            if (iconType === 'text') {
                const textColor = document.getElementById('textColor').value;
                const text = document.getElementById('iconText').value || 'A';
                const fontSize = parseInt(document.getElementById('fontSize').value) * (canvasWidth / 1024);

                ctx.fillStyle = textColor;
                ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, canvasWidth / 2, canvasHeight / 2);
            } else if (iconType === 'image') {
                if (uploadedImage) {
                    const imgPadding = canvasWidth * 0.12;
                    const imageSize = canvasWidth - imgPadding * 2;
                    const scaledImageSize = imageSize * (imageScale / 100);
                    const imgX = (canvasWidth - scaledImageSize) / 2;
                    const imgY = (canvasHeight - scaledImageSize) / 2;

                    ctx.drawImage(uploadedImage, imgX, imgY, scaledImageSize, scaledImageSize);
                } else {
                    // Fallback text if no image is uploaded
                    const textColor = document.getElementById('textColor').value;
                    ctx.fillStyle = textColor;
                    ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('No Image', canvasWidth / 2, canvasHeight / 2);
                }
            }

            ctx.restore();
        }
        // === MODIFICATION END ===

        function selectAllSizes() {
            
            const sizes = platformSizes[currentPlatform];
            sizes.forEach(size => {
                selectedSizes.add(size.id);
                const checkbox = document.getElementById(size.id);
                if (checkbox) checkbox.checked = true;
            });
        }

        function deselectAllSizes() {
            
            const sizes = platformSizes[currentPlatform];
            sizes.forEach(size => {
                selectedSizes.delete(size.id);
                const checkbox = document.getElementById(size.id);
                if (checkbox) checkbox.checked = false;
            });
        }

        function downloadSelected() {
            
            const selectedSizesArray = Array.from(selectedSizes);
            if (selectedSizesArray.length === 0) {
                showToast('请至少选择一个尺寸', 'error');
                return;
            }

            
            const sizesToDownload = [];
            for (const id of selectedSizesArray) {
                if (sizeIdMap[id]) {
                    sizesToDownload.push({
                        ...sizeIdMap[id].size,
                        platform: sizeIdMap[id].platform
                    });
                }
            }

            downloadIcons(sizesToDownload, 'Selected-Icons');
        }

        function downloadAll() {
            
            const allSizes = [];
            for (const [platform, sizes] of Object.entries(platformSizes)) {
                for (const size of sizes) {
                    allSizes.push({
                        ...size,
                        platform
                    });
                }
            }

            downloadIcons(allSizes, 'All-Platforms-Icons');
        }

        function downloadIcons(sizes, zipFileName) {
            const zip = new JSZip();

            let completed = 0;
            const total = sizes.length;

            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size.width;
                canvas.height = size.height;
                const ctx = canvas.getContext('2d');

                drawIconOnCanvas(ctx, size.width, size.height);

                
                canvas.toBlob(function(blob) {
                    
                    zip.file(`${size.platform}/${size.name}_${size.width}x${size.height}.png`, blob);

                    completed++;
                    if (completed === total) {
                        
                        zip.generateAsync({type: "blob"}).then(function(content) {
                            const url = URL.createObjectURL(content);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `${zipFileName}.zip`;
                            a.click();
                            URL.revokeObjectURL(url);

                            showToast(`成功下载 ${total} 个图标文件！`);
                        });
                    }
                }, 'image/png');
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#ff3b30' : '#34c759';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
